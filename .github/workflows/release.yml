name: Release and Publish

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  # Determine if this is a release commit
  check-release:
    name: Check Release Needed
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.version.outputs.version }}

    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Check commit message
      id: check
      run: |
        COMMIT_MSG=$(git log -1 --pretty=%B)
        if [[ "$COMMIT_MSG" =~ ^(feat|fix|perf|BREAKING\ CHANGE)(\(.*\))?!?: ]] || [[ "$GITHUB_REF" == refs/tags/v* ]]; then
          echo "should_release=true" >> $GITHUB_OUTPUT
        else
          echo "should_release=false" >> $GITHUB_OUTPUT
        fi

    - name: Determine version
      id: version
      run: |
        if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
          VERSION=${GITHUB_REF#refs/tags/v}
        else
          # Get latest tag or default to 1.0.0
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.0.0")
          VERSION=${LATEST_TAG#v}

          # Parse semantic version
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)

          # Determine version bump based on commit message
          COMMIT_MSG=$(git log -1 --pretty=%B)
          if [[ "$COMMIT_MSG" =~ ^BREAKING\ CHANGE ]] || [[ "$COMMIT_MSG" =~ ! ]]; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          elif [[ "$COMMIT_MSG" =~ ^feat ]]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          VERSION="$MAJOR.$MINOR.$PATCH"
        fi
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Next version: $VERSION"

  # Run full CI before releasing
  run-ci:
    name: Run CI Pipeline
    needs: check-release
    if: needs.check-release.outputs.should_release == 'true'
    uses: ./.github/workflows/ci.yml

  # Create GitHub release
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [check-release, run-ci]
    if: needs.check-release.outputs.should_release == 'true'
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}

    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Generate changelog
      id: changelog
      run: |
        VERSION="${{ needs.check-release.outputs.version }}"
        PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

        echo "# Release v$VERSION" > RELEASE_NOTES.md
        echo "" >> RELEASE_NOTES.md
        echo "## What's Changed" >> RELEASE_NOTES.md
        echo "" >> RELEASE_NOTES.md

        if [ -z "$PREV_TAG" ]; then
          # First release - include all commits
          git log --pretty=format:"- %s (%h)" >> RELEASE_NOTES.md
        else
          # Generate changelog from previous tag
          git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" --reverse >> RELEASE_NOTES.md
        fi

        echo "" >> RELEASE_NOTES.md
        echo "" >> RELEASE_NOTES.md
        echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...v${VERSION}" >> RELEASE_NOTES.md

    - name: Update CHANGELOG.md
      run: |
        VERSION="${{ needs.check-release.outputs.version }}"
        DATE=$(date +%Y-%m-%d)

        # Create new changelog entry
        echo "# Changelog" > CHANGELOG_NEW.md
        echo "" >> CHANGELOG_NEW.md
        echo "## [v$VERSION] - $DATE" >> CHANGELOG_NEW.md
        echo "" >> CHANGELOG_NEW.md
        tail -n +3 RELEASE_NOTES.md >> CHANGELOG_NEW.md
        echo "" >> CHANGELOG_NEW.md

        # Append existing changelog (skip header)
        if [ -f CHANGELOG.md ]; then
          tail -n +3 CHANGELOG.md >> CHANGELOG_NEW.md
        fi

        mv CHANGELOG_NEW.md CHANGELOG.md

    - name: Commit changelog
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add CHANGELOG.md
        git commit -m "chore: update changelog for v${{ needs.check-release.outputs.version }}" || echo "No changes to commit"
        git push || echo "Nothing to push"

    - name: Create Git tag
      run: |
        VERSION="${{ needs.check-release.outputs.version }}"
        git tag -a "v$VERSION" -m "Release v$VERSION"
        git push origin "v$VERSION" || echo "Tag already exists"

    - name: Create GitHub Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ needs.check-release.outputs.version }}
        release_name: Release v${{ needs.check-release.outputs.version }}
        body_path: RELEASE_NOTES.md
        draft: false
        prerelease: false

  # Build and publish Docker images
  publish-docker:
    name: Build and Publish Docker Images
    runs-on: ubuntu-latest
    needs: [check-release, create-release]
    if: needs.check-release.outputs.should_release == 'true'

    strategy:
      matrix:
        service: [backend, frontend]

    steps:
    - uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v4
      with:
        images: |
          ${{ secrets.DOCKER_USERNAME }}/lit-rift-${{ matrix.service }}
          ghcr.io/${{ github.repository }}/${{ matrix.service }}
        tags: |
          type=semver,pattern={{version}},value=v${{ needs.check-release.outputs.version }}
          type=semver,pattern={{major}}.{{minor}},value=v${{ needs.check-release.outputs.version }}
          type=semver,pattern={{major}},value=v${{ needs.check-release.outputs.version }}
          type=raw,value=latest
          type=sha,prefix={{branch}}-

    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: ./${{ matrix.service }}
        file: ./${{ matrix.service }}/Dockerfile
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/lit-rift-${{ matrix.service }}:buildcache
        cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/lit-rift-${{ matrix.service }}:buildcache,mode=max

    - name: Update Docker Hub description
      uses: peter-evans/dockerhub-description@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
        repository: ${{ secrets.DOCKER_USERNAME }}/lit-rift-${{ matrix.service }}
        short-description: "Lit-Rift ${{ matrix.service }} - AI-powered novel creation platform"
        readme-filepath: ./README.md

  # Create release artifacts
  create-artifacts:
    name: Create Release Artifacts
    runs-on: ubuntu-latest
    needs: [check-release, create-release]
    if: needs.check-release.outputs.should_release == 'true'

    steps:
    - uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Build frontend
      run: |
        cd frontend
        npm ci --legacy-peer-deps
        npm run build

    - name: Create source archives
      run: |
        VERSION="${{ needs.check-release.outputs.version }}"

        # Create source tarball
        tar -czf lit-rift-v$VERSION-source.tar.gz \
          --exclude=node_modules \
          --exclude=build \
          --exclude=.git \
          --exclude=__pycache__ \
          --exclude=venv \
          --exclude=.pytest_cache \
          --exclude=coverage \
          .

        # Create frontend build archive
        cd frontend/build
        tar -czf ../../lit-rift-v$VERSION-frontend.tar.gz .
        cd ../..

        # Create backend archive
        cd backend
        tar -czf ../lit-rift-v$VERSION-backend.tar.gz \
          --exclude=__pycache__ \
          --exclude=venv \
          --exclude=.pytest_cache \
          --exclude=coverage \
          .
        cd ..

    - name: Upload release assets
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ needs.create-release.outputs.upload_url }}
        asset_path: ./lit-rift-v${{ needs.check-release.outputs.version }}-source.tar.gz
        asset_name: lit-rift-v${{ needs.check-release.outputs.version }}-source.tar.gz
        asset_content_type: application/gzip

    - name: Upload frontend artifact
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ needs.create-release.outputs.upload_url }}
        asset_path: ./lit-rift-v${{ needs.check-release.outputs.version }}-frontend.tar.gz
        asset_name: lit-rift-v${{ needs.check-release.outputs.version }}-frontend.tar.gz
        asset_content_type: application/gzip

    - name: Upload backend artifact
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ needs.create-release.outputs.upload_url }}
        asset_path: ./lit-rift-v${{ needs.check-release.outputs.version }}-backend.tar.gz
        asset_name: lit-rift-v${{ needs.check-release.outputs.version }}-backend.tar.gz
        asset_content_type: application/gzip

  # Notify on completion
  notify:
    name: Notify Release Complete
    runs-on: ubuntu-latest
    needs: [check-release, create-release, publish-docker, create-artifacts]
    if: needs.check-release.outputs.should_release == 'true'

    steps:
    - name: Create success summary
      run: |
        VERSION="${{ needs.check-release.outputs.version }}"
        echo "## 🚀 Release v$VERSION Published Successfully!" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### What was published:" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ GitHub Release: https://github.com/${{ github.repository }}/releases/tag/v$VERSION" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Docker Images (backend & frontend)" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Source archives" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Docker Images:" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
        echo "docker pull ${{ secrets.DOCKER_USERNAME }}/lit-rift-backend:$VERSION" >> $GITHUB_STEP_SUMMARY
        echo "docker pull ${{ secrets.DOCKER_USERNAME }}/lit-rift-frontend:$VERSION" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
