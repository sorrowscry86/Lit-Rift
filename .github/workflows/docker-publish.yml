name: Docker Build and Publish

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Docker image tag'
        required: true
        default: 'latest'
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'docker-compose.yml'
      - '.github/workflows/docker-publish.yml'

permissions:
  packages: write
  contents: read

jobs:
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: [backend, frontend]

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to Docker Hub
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Log in to GitHub Container Registry
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v4
      with:
        images: |
          ${{ secrets.DOCKER_USERNAME }}/lit-rift-${{ matrix.service }}
          ghcr.io/${{ github.repository }}/${{ matrix.service }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}
          type=raw,value=latest,enable={{is_default_branch}}
          type=sha,prefix={{branch}}-
          type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: ./${{ matrix.service }}
        file: ./${{ matrix.service }}/Dockerfile
        platforms: linux/amd64,linux/arm64
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/lit-rift-${{ matrix.service }}:buildcache
        cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/lit-rift-${{ matrix.service }}:buildcache,mode=max
        build-args: |
          BUILD_DATE=${{ steps.meta.outputs.created }}
          VCS_REF=${{ github.sha }}

    - name: Test Docker image
      run: |
        docker pull ${{ secrets.DOCKER_USERNAME }}/lit-rift-${{ matrix.service }}:latest

        # Basic smoke test
        if [ "${{ matrix.service }}" = "backend" ]; then
          docker run --rm -e FLASK_ENV=production -e GOOGLE_API_KEY=test \
            ${{ secrets.DOCKER_USERNAME }}/lit-rift-${{ matrix.service }}:latest \
            python -c "import app; print('Backend smoke test passed')"
        else
          # Frontend - just check if nginx config is valid
          docker run --rm ${{ secrets.DOCKER_USERNAME }}/lit-rift-${{ matrix.service }}:latest \
            nginx -t
        fi

    - name: Scan for vulnerabilities
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ secrets.DOCKER_USERNAME }}/lit-rift-${{ matrix.service }}:latest
        format: 'sarif'
        output: 'trivy-results.sarif'
        severity: 'CRITICAL,HIGH'

    - name: Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v2
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

  # Test docker-compose deployment
  test-compose:
    name: Test Docker Compose Deployment
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Create .env file
      run: |
        cat > .env << EOF
        GOOGLE_API_KEY=test_key_for_ci
        FIREBASE_CONFIG={"type":"service_account","project_id":"test"}
        FLASK_ENV=production
        EOF

    - name: Start services with docker-compose
      run: |
        docker-compose up -d
        sleep 30

    - name: Check services health
      run: |
        # Check backend health
        curl -f http://localhost:5000/api/health || (docker-compose logs && exit 1)

        # Check frontend is serving
        curl -f http://localhost/ || (docker-compose logs && exit 1)

    - name: Show logs
      if: failure()
      run: docker-compose logs

    - name: Stop services
      if: always()
      run: docker-compose down

  # Update Docker Hub repository documentation
  update-readme:
    name: Update Docker Hub README
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    strategy:
      matrix:
        service: [backend, frontend]

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Create service-specific README
      run: |
        cat > DOCKER_README_${{ matrix.service }}.md << 'EOF'
        # Lit-Rift ${{ matrix.service }}

        AI-powered novel creation platform - ${{ matrix.service }} service

        ## Quick Start

        ```bash
        docker pull ${{ secrets.DOCKER_USERNAME }}/lit-rift-${{ matrix.service }}:latest
        ```

        ## Using with Docker Compose

        ```yaml
        version: '3.8'
        services:
          ${{ matrix.service }}:
            image: ${{ secrets.DOCKER_USERNAME }}/lit-rift-${{ matrix.service }}:latest
        ```

        ## Documentation

        Full documentation: https://github.com/${{ github.repository }}

        ## Supported Tags

        - `latest` - Latest stable release
        - `v1.x.x` - Specific version
        - `main-<sha>` - Development builds

        ## Environment Variables

        See the [deployment guide](https://github.com/${{ github.repository }}/blob/main/DEPLOYMENT.md) for configuration options.

        ## License

        MIT License - see repository for details
        EOF

    - name: Update Docker Hub description
      uses: peter-evans/dockerhub-description@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
        repository: ${{ secrets.DOCKER_USERNAME }}/lit-rift-${{ matrix.service }}
        short-description: "Lit-Rift ${{ matrix.service }} - AI-powered novel creation platform"
        readme-filepath: ./DOCKER_README_${{ matrix.service }}.md
